<!DOCTYPE html>
<html>
<head>
<title>Visit Counter</title>
<style>
body{
font-family: Arial;
text-align: center;
margin-top: 50px;
}
.box{
border:1px solid #ccc;
padding:20px;
width:400px;
margin:auto;
border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
<h1>Visit Counter</h1>

<h2>Visits: <span id="counter">0</span></h2>

<h3>Server Info</h3>
<p><b>Hostname:</b> <span id="hostname"></span></p>
<p><b>Port:</b> <span id="port"></span></p>
<p><b>Server IP:</b> <span id="serverip"></span></p>

<h3>Client Info</h3>
<p><b>IP:</b> <span id="clientip"></span></p>

</div>

<script>

let count = localStorage.getItem("visits") || 0;
count++;
localStorage.setItem("visits", count);
document.getElementById("counter").innerText = count;

document.getElementById("hostname").innerText = window.location.hostname;
document.getElementById("port").innerText = window.location.port || "80";
document.getElementById("serverip").innerText = "Azure Server";
document.getElementById("clientip").innerText = "Your IP";

</script>

</body>
</html>
