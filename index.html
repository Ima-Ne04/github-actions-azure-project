<!DOCTYPE html>
<html>
<head>
<title>Visit Counter</title>

<style>
body{
font-family: Arial;
margin:40px;
}

h1{
font-size:32px;
}

hr{
margin:30px 0;
}
</style>

</head>

<body>

<h1>Visit Counter</h1>

<h3>Visits: <span id="visits"></span></h3>

<hr>

<h2>Server Info</h2>

<p><b>Hostname:</b> <span id="hostname"></span></p>
<p><b>Port:</b> <span id="port"></span></p>
<p><b>Server IP:</b> <span id="serverip"></span></p>

<hr>

<h2>Client Info</h2>

<p><b>IP:</b> <span id="clientip"></span></p>

<script>

fetch("/api")
.then(res=>res.json())
.then(data=>{

document.getElementById("visits").innerText = data.visits;
document.getElementById("hostname").innerText = data.hostname;
document.getElementById("port").innerText = data.port;
document.getElementById("serverip").innerText = data.serverip;
document.getElementById("clientip").innerText = data.clientip;

});

</script>

</body>
</html>
