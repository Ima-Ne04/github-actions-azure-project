<!DOCTYPE html>
<html>
<head>
<title>Visit Counter</title>

<style>

body{
font-family: Arial;
margin:40px;
}

hr{
margin:30px 0;
}

</style>

</head>

<body>

<h1>Visit Counter</h1>

<h3>Visits: <span id="counter"></span></h3>

<hr>

<h2>Server Info</h2>

<p><b>Hostname:</b> <span id="hostname"></span></p>
<p><b>Port:</b> <span id="port"></span></p>
<p><b>Server IP:</b> <span id="serverip"></span></p>

<hr>

<h2>Client Info</h2>

<p><b>Your Browser:</b> <span id="browser"></span></p>
<p><b>Your IP:</b> <span id="clientip"></span></p>

<script>

let count = localStorage.getItem("visits");

if(count === null){
count = 0;
}

count++;

localStorage.setItem("visits", count);

document.getElementById("counter").innerText = count;

document.getElementById("hostname").innerText = window.location.hostname;

document.getElementById("port").innerText = window.location.port || "80";

document.getElementById("browser").innerText = navigator.userAgent;

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{
document.getElementById("clientip").innerText = data.ip;
});

document.getElementById("serverip").innerText = "Azure Server";

</script>

</body>
</html>
